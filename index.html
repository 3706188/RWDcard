<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <div class="container">
    <div class="product-page">
      <div class="product-image">
        <picture>
          <source media="(max-width:768px)" srcset="./images/image-product-mobile.jpg">
          <img src="./images/image-product-desktop.jpg" alt="perfume bottle">
        </picture>
      </div>
      <div class="information">
        <p class="tag">Perfume</p>
        <H1 class="black">
          Gabrielle Essence Eau De Parfum
        </H1>
        <div class="description">
          <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
          Perfumer-Creator for the House of CHANEL.</p>
        </div>
        <div class="price">
          <H1 class="green">$149.99</H1>
          <p class="grey"><s>$169.99</s></p>
        </div>
        <button class="btn">
          <img src="./images/icon-cart.svg" alt="cart icon">
          <p class="btn-text">Add to Cart</p>
        </button>
        
      </div>
    </div>
  </div>
</body>
</html>
